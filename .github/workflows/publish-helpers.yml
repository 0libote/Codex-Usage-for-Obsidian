name: Publish Managed Helpers

on:
  workflow_dispatch:
    inputs:
      upstream_version:
        description: Reviewed CodexBar and Win-CodexBar version
        required: true
        default: "0.38.1"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - upstream_arch: arm64
            target: macos-arm64
          - upstream_arch: x86_64
            target: macos-x64
    steps:
      - uses: actions/checkout@v4
      - name: Download and verify upstream CLI
        env:
          VERSION: ${{ inputs.upstream_version }}
          ARCH: ${{ matrix.upstream_arch }}
        run: |
          set -euo pipefail
          base="https://github.com/steipete/CodexBar/releases/download/v$VERSION"
          asset="CodexBarCLI-v$VERSION-macos-$ARCH.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 -o upstream.tar.gz "$base/$asset"
          curl --fail --location --proto '=https' --tlsv1.2 -o upstream.sha256 "$base/$asset.sha256"
          test "$(shasum -a 256 upstream.tar.gz | cut -d' ' -f1)" = "$(cut -d' ' -f1 upstream.sha256)"
          mkdir package
          tar -xzf upstream.tar.gz -C package
          test -x package/CodexBarCLI
          package/CodexBarCLI --version | grep "$VERSION"
          package/CodexBarCLI usage --help >/dev/null
          cp helpers/licences/CodexBar-LICENSE package/
      - name: Package helper
        run: |
          asset="codex-usage-helper-${{ matrix.target }}.tar.gz"
          tar -czf "$asset" -C package CodexBarCLI CodexBar-LICENSE
          shasum -a 256 "$asset" > "$asset.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: helper-${{ matrix.target }}
          path: codex-usage-helper-${{ matrix.target }}.tar.gz*

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and verify upstream installer
        shell: pwsh
        env:
          VERSION: ${{ inputs.upstream_version }}
        run: |
          $base = "https://github.com/Finesssee/Win-CodexBar/releases/download/v$env:VERSION"
          $asset = "CodexBar-$env:VERSION-Setup.exe"
          Invoke-WebRequest "$base/$asset" -OutFile upstream.exe
          Invoke-WebRequest "$base/$asset.sha256" -OutFile upstream.sha256
          $expected = (Get-Content upstream.sha256).Split()[0]
          $actual = (Get-FileHash upstream.exe -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $expected) { throw "Upstream installer checksum mismatch" }
      - name: Extract and smoke-test CLI
        shell: pwsh
        env:
          VERSION: ${{ inputs.upstream_version }}
        run: |
          $install = Join-Path $env:RUNNER_TEMP codexbar
          $process = Start-Process .\upstream.exe -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-", "/DIR=$install" -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Installer extraction failed: $($process.ExitCode)" }
          $cli = Get-ChildItem $install -Filter codexbar-cli.exe -Recurse | Select-Object -First 1
          if (-not $cli) { throw "codexbar-cli.exe not found in installer" }
          & $cli.FullName --version | Select-String $env:VERSION
          & $cli.FullName usage --help | Out-Null
          New-Item package -ItemType Directory
          Copy-Item $cli.FullName package\codexbar-cli.exe
          Copy-Item helpers\licences\Win-CodexBar-LICENSE package\
      - name: Package helper
        shell: pwsh
        run: |
          Compress-Archive package\* codex-usage-helper-windows-x64.zip
          $hash = (Get-FileHash codex-usage-helper-windows-x64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  codex-usage-helper-windows-x64.zip" | Set-Content codex-usage-helper-windows-x64.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: helper-windows-x64
          path: codex-usage-helper-windows-x64.zip*

  release:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: helper-*
          merge-multiple: true
      - name: Publish separate helper release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: helpers-${{ inputs.upstream_version }}
        run: |
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "Managed helpers ${{ inputs.upstream_version }}" --notes "Reviewed candidate helpers for Codex Usage for Obsidian. Built from checksum-verified upstream release assets; distributed under upstream licences." --prerelease \
            codex-usage-helper-*
