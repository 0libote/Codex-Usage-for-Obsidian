name: Validate artifact actions

on:
  pull_request:

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - run: echo "artifact action validation" > validation.txt
      - uses: actions/upload-artifact@v7
        with:
          name: validation-artifact
          path: validation.txt

  download:
    needs: upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: validation-artifact
      - run: grep -F "artifact action validation" validation.txt
