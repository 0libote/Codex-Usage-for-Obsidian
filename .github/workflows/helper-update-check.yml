name: Check Helper Updates

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun ci
      - name: Check and stage upstream helper updates
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: bun scripts/check-helper-updates.mjs
      - run: bun run test
      - run: bun run build
      - name: Create review PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/helper-updates
          delete-branch: true
          commit-message: "chore: update managed Codex helpers"
          title: "chore: update managed Codex helpers"
          body-path: .helper-update-pr.md
          labels: dependencies,helper-update
