name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun ci
      - name: Sync version from tag
        id: sync-version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Using release version $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          RELEASE_VERSION="$VERSION" bun <<'BUN'
          const fs = require("node:fs");

          const version = process.env.RELEASE_VERSION;
          if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Tag must be a semver version, optionally prefixed with v. Got: ${version}`);
          }

          let changed = false;
          const readJson = path => JSON.parse(fs.readFileSync(path, "utf8"));
          const writeJson = (path, value) => {
            const next = `${JSON.stringify(value, null, 2)}\n`;
            const current = fs.existsSync(path) ? fs.readFileSync(path, "utf8") : "";
            if (current !== next) {
              fs.writeFileSync(path, next);
              changed = true;
            }
          };

          const manifest = readJson("manifest.json");
          manifest.version = version;
          writeJson("manifest.json", manifest);

          const packageJson = readJson("package.json");
          packageJson.version = version;
          writeJson("package.json", packageJson);

          const versions = readJson("versions.json");
          versions[version] = manifest.minAppVersion;
          writeJson("versions.json", versions);

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `changed=${changed}\n`);
          BUN
      - run: bun run test
      - run: bun run check
      - run: bun run build
      - name: Create release archive
        run: zip -j codex-usage-for-obsidian.zip main.js manifest.json styles.css
      - name: Commit synced version
        if: steps.sync-version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json package.json versions.json
          git commit -m "Bump version to ${{ steps.sync-version.outputs.version }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
      - name: Version already synced
        if: steps.sync-version.outputs.changed != 'true'
        run: echo "Version files already match ${{ steps.sync-version.outputs.version }}"
      - name: Attest release files
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
            codex-usage-for-obsidian.zip
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.sync-version.outputs.version }}
        run: |
          files=(main.js manifest.json styles.css codex-usage-for-obsidian.zip)
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" "${files[@]}" --clobber
          else
            gh release create "$VERSION" "${files[@]}" --generate-notes
          fi
